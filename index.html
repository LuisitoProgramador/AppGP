<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#242424" />
    <meta name="description" content="Pulso — control financiero personal con claridad y enfoque" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulso" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Pulso</title>
    <script>
      ;(function () {
        var doc = document.documentElement
        var standalone =
          window.navigator.standalone === true ||
          window.matchMedia('(display-mode: standalone)').matches
        if (standalone) doc.classList.add('standalone-pwa')

        function applyViewport() {
          var h = window.innerHeight
          doc.style.setProperty('--app-height', h + 'px')
          if (!standalone) return
          var gap = Math.max(0, h - doc.clientHeight)
          var inset = Math.max(gap, 34)
          doc.style.setProperty('--bottom-inset', inset + 'px')
          doc.style.setProperty('--ios-home-indicator', inset + 'px')
        }

        applyViewport()
        window.addEventListener('resize', applyViewport)
        window.addEventListener('orientationchange', applyViewport)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
